<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000010">
  <title>Élio — Game Room</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { width:100%; height:100%; overflow:hidden; background:#000010; touch-action:none; }

    /* ══════════════════════════════
       MENU SÉLECTION
    ══════════════════════════════ */
    #menu {
      position:fixed; inset:0; z-index:100;
      display:flex; flex-direction:column;
      background:#000010;
      overflow-y:auto; overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      touch-action:pan-y;
    }

    /* Fond poster */
    #menu-bg {
      position:fixed; inset:0; z-index:0;
      background-image: url('poster.png');
      background-size: cover;
      background-position: center 20%;
      filter: brightness(0.35) blur(2px);
    }
    #menu-bg::after {
      content:'';
      position:absolute; inset:0;
      background: linear-gradient(180deg, rgba(0,0,16,0.3) 0%, rgba(0,0,16,0.85) 60%, #000010 100%);
    }

    /* Header */
    .menu-header {
      position:relative; z-index:1;
      text-align:center;
      padding: 36px 20px 12px;
      flex-shrink:0;
    }

    .title-elio {
      font-size: clamp(38px,14vw,64px);
      font-weight:900; font-style:italic;
      letter-spacing:3px;
      color:#fff;
      text-shadow: 0 0 20px #0060ff, 0 0 50px #0040cc, 3px 3px 0 #00008b;
      line-height:1;
    }
    .title-sub {
      font-size: clamp(10px,3.5vw,16px);
      font-weight:700; letter-spacing:5px;
      color:#4fc3f7;
      text-shadow:0 0 10px #4fc3f7;
      margin-top:4px;
    }
    .title-room {
      font-size: clamp(14px,5vw,22px);
      font-weight:900; letter-spacing:2px;
      color:#FFD700;
      text-shadow:0 0 15px #ffd700;
      margin-top:2px;
    }

    /* Grille jeux */
    .games-grid {
      position:relative; z-index:1;
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(min(160px, 42vw), 1fr));
      gap:14px;
      padding:20px 16px max(32px, env(safe-area-inset-bottom, 32px));
      flex:1;
    }

    .game-card {
      border-radius:16px;
      overflow:hidden;
      cursor:pointer;
      position:relative;
      background:rgba(255,255,255,0.05);
      border:2px solid rgba(255,255,255,0.1);
      transition:transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      touch-action:manipulation;
      aspect-ratio: 3/4;
      display:flex; flex-direction:column;
    }
    .game-card:active { transform:scale(0.94); }

    /* Couleur par jeu */
    .game-card[data-id="sonic1"]    { --c1:#0044ff; --c2:#00aaff; }
    .game-card[data-id="sonic2"]    { --c1:#0066ff; --c2:#FFD700; }
    .game-card[data-id="triple"]    { --c1:#8800ff; --c2:#ff00cc; }
    .game-card[data-id="ecco"]      { --c1:#00668b; --c2:#00eeff; }
    .game-card[data-id="streets"]   { --c1:#aa0000; --c2:#ff4400; }

    .game-card-art {
      flex:1;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(44px,12vw,64px);
      position:relative;
      overflow:hidden;
    }
    .game-card-art::before {
      content:'';
      position:absolute; inset:0;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), transparent 60%);
    }
    .game-card-art::after {
      content:'';
      position:absolute; bottom:0; left:0; right:0; height:40%;
      background:linear-gradient(transparent, rgba(0,0,0,0.5));
    }

    .game-card-info {
      padding:10px 10px 12px;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(4px);
    }
    .game-card-title {
      font-size:clamp(10px,3vw,13px);
      font-weight:900;
      color:#fff;
      line-height:1.2;
      letter-spacing:0.3px;
    }
    .game-card-system {
      font-size:9px;
      color:rgba(255,255,255,0.45);
      margin-top:3px;
      letter-spacing:1px;
      text-transform:uppercase;
    }

    .play-badge {
      position:absolute; top:8px; right:8px; z-index:2;
      width:28px; height:28px;
      border-radius:50%;
      background:rgba(0,0,0,0.5);
      border:1.5px solid rgba(255,255,255,0.3);
      display:flex; align-items:center; justify-content:center;
      font-size:11px;
      color:rgba(255,255,255,0.7);
    }

    /* ══════════════════════════════
       ÉCRAN JEU
    ══════════════════════════════ */
    #app {
      display:none; flex-direction:column;
      width:100%; height:100%;
      background:#000;
    }
    #app.visible { display:flex; }

    #topbar {
      position:relative; z-index:10;
      background:linear-gradient(90deg,#000820,#001040,#000820);
      border-bottom:2px solid rgba(0,150,255,0.3);
      padding:6px 12px;
      display:flex; align-items:center; gap:10px;
      flex-shrink:0;
    }
    #back-btn {
      width:28px; height:28px;
      border-radius:6px;
      background:rgba(0,80,200,0.4);
      border:1px solid rgba(0,150,255,0.5);
      color:rgba(255,255,255,0.7);
      font-size:14px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; flex-shrink:0;
    }
    #game-title-bar {
      flex:1;
      font-size:11px; font-weight:900; font-style:italic;
      letter-spacing:2px;
      background:linear-gradient(90deg,#0af,#FFD700);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .player-name {
      font-size:10px; font-weight:700;
      color:#FFD700; text-shadow:0 0 8px #ffd700;
      letter-spacing:1px; flex-shrink:0;
    }

    #emu-wrapper {
      flex:1; position:relative;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden; background:#000;
    }
    #game { width:100%; height:100%; display:block; }

    /* ── Manette ── */
    #ctrl {
      position:absolute; inset:0; z-index:20;
      pointer-events:none;
      /* Les touches passent au canvas sauf sur les boutons */
    }
    /* Zone centrale du jeu : cliquable pour démarrer */
    #game-tap {
      position:absolute; inset:0; z-index:19;
      pointer-events:all;
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }
    #game-tap.hidden { pointer-events:none; display:none; }
    #tap-hint {
      background:rgba(0,0,0,.55);
      border:2px solid rgba(0,180,255,.5);
      border-radius:20px;
      padding:12px 24px;
      color:#fff; font-size:13px; font-weight:700;
      letter-spacing:2px; text-transform:uppercase;
      animation: pulse-hint 1.2s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes pulse-hint {
      0%,100%{opacity:1;transform:scale(1)}
      50%{opacity:.6;transform:scale(.97)}
    }
    #dpad {
      position:absolute;
      bottom:max(18px, env(safe-area-inset-bottom,18px));
      left:16px;
      display:flex; gap:8px;
      pointer-events:none;
    }
    .dpad-btn {
      width:72px; height:72px;
      border-radius:16px;
      background:rgba(0,120,255,0.18);
      border:2px solid rgba(0,180,255,0.45);
      display:flex; align-items:center; justify-content:center;
      font-size:28px; color:rgba(255,255,255,0.55);
      pointer-events:all; user-select:none; -webkit-user-select:none;
      touch-action:none; cursor:pointer;
      transition:background .08s,transform .08s,border-color .08s;
      box-shadow:0 2px 12px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1);
    }
    .dpad-btn.pressed {
      background:rgba(0,160,255,.55); border-color:rgba(0,220,255,.9);
      color:#fff; transform:scale(.92);
      box-shadow:0 0 20px rgba(0,180,255,.6),inset 0 1px 0 rgba(255,255,255,.2);
    }
    #action-btns {
      position:absolute;
      bottom:max(18px,env(safe-area-inset-bottom,18px));
      right:16px;
      display:flex; flex-direction:column; align-items:flex-end; gap:10px;
      pointer-events:none;
    }
    #btn-start {
      width:80px; height:46px; border-radius:23px;
      background:rgba(255,200,0,.25); border:3px solid rgba(255,215,0,.7);
      color:#FFD700; font-size:11px; font-weight:900;
      letter-spacing:2px; text-transform:uppercase;
      display:flex; align-items:center; justify-content:center;
      pointer-events:all; user-select:none; -webkit-user-select:none;
      touch-action:none; cursor:pointer;
      transition:background .08s,transform .08s;
      box-shadow:0 2px 12px rgba(255,200,0,.3);
    }
    #btn-start.pressed {
      background:rgba(255,215,0,.6); border-color:#FFD700;
      color:#000; transform:scale(.92);
      box-shadow:0 0 20px rgba(255,215,0,.7);
    }
    #btn-jump {
      width:90px; height:90px; border-radius:50%;
      background:rgba(0,200,80,.25); border:3px solid rgba(0,230,100,.7);
      color:#fff; font-size:36px;
      display:flex; align-items:center; justify-content:center;
      pointer-events:all; user-select:none; -webkit-user-select:none;
      touch-action:none; cursor:pointer;
      transition:background .08s,transform .08s,border-color .08s;
      box-shadow:0 2px 20px rgba(0,0,0,.5),0 0 12px rgba(0,230,100,.3);
    }
    #btn-jump.pressed {
      background:rgba(0,230,100,.6); border-color:rgba(0,255,120,.95);
      color:#fff; transform:scale(.9);
      box-shadow:0 0 28px rgba(0,230,100,.7);
    }
    #fs-btn {
      position:absolute; top:8px; right:12px; z-index:50;
      width:32px; height:32px;
      background:rgba(0,80,200,.4); border:1px solid rgba(0,150,255,.5);
      border-radius:6px; color:rgba(255,255,255,.6); font-size:14px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; pointer-events:all;
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════
     MENU SÉLECTION
══════════════════════════════ -->
<div id="menu">
  <div id="menu-bg"></div>

  <div class="menu-header">
    <div class="title-elio">ÉLIO</div>
    <div class="title-sub">★ GAME ROOM ★</div>
    <div class="title-room">Choisis ton jeu</div>
  </div>

  <div class="games-grid">

    <div class="game-card" data-id="sonic1" data-rom="rom/Sonic the Hedgehog.gg" data-title="Sonic the Hedgehog">
      <div class="game-card-art">🦔</div>
      <div class="play-badge">▶</div>
      <div class="game-card-info">
        <div class="game-card-title">Sonic the Hedgehog</div>
        <div class="game-card-system">Game Gear • 1991</div>
      </div>
    </div>

    <div class="game-card" data-id="sonic2" data-rom="rom/Sonic the Hedgehog 2.gg" data-title="Sonic the Hedgehog 2">
      <div class="game-card-art">⚡</div>
      <div class="play-badge">▶</div>
      <div class="game-card-info">
        <div class="game-card-title">Sonic the Hedgehog 2</div>
        <div class="game-card-system">Game Gear • 1992</div>
      </div>
    </div>

    <div class="game-card" data-id="triple" data-rom="rom/Sonic the Hedgehog - Triple Trouble.gg" data-title="Sonic Triple Trouble">
      <div class="game-card-art">🌀</div>
      <div class="play-badge">▶</div>
      <div class="game-card-info">
        <div class="game-card-title">Sonic Triple Trouble</div>
        <div class="game-card-system">Game Gear • 1994</div>
      </div>
    </div>

    <div class="game-card" data-id="ecco" data-rom="rom/Ecco the Dolphin 2 - Tthe Tides of Time.gg" data-title="Ecco the Dolphin 2">
      <div class="game-card-art">🐬</div>
      <div class="play-badge">▶</div>
      <div class="game-card-info">
        <div class="game-card-title">Ecco the Dolphin 2</div>
        <div class="game-card-system">Game Gear • 1995</div>
      </div>
    </div>

    <div class="game-card" data-id="streets" data-rom="rom/Streets of Rage 2.gg" data-title="Streets of Rage 2">
      <div class="game-card-art">👊</div>
      <div class="play-badge">▶</div>
      <div class="game-card-info">
        <div class="game-card-title">Streets of Rage 2</div>
        <div class="game-card-system">Game Gear • 1993</div>
      </div>
    </div>

  </div>
</div>

<!-- ══════════════════════════════
     ÉCRAN JEU
══════════════════════════════ -->
<div id="app">
  <div id="topbar">
    <div id="back-btn" title="Menu">←</div>
    <div id="game-title-bar">SONIC 2</div>
    <span class="player-name">⭐ ÉLIO</span>
  </div>
  <div id="emu-wrapper">
    <div id="game"></div>
    <div id="game-tap"><div id="tap-hint">▶ APPUIE POUR JOUER</div></div>
    <div id="ctrl">
      <div id="dpad">
        <div class="dpad-btn" id="btn-left">◀</div>
        <div class="dpad-btn" id="btn-right">▶</div>
      </div>
      <div id="action-btns">
        <div id="btn-start">START</div>
        <div id="btn-jump">🔵</div>
      </div>
    </div>
    <div id="fs-btn" title="Plein écran">⛶</div>
  </div>
</div>

<script>
// ── Config EmulatorJS ────────────────────────────────────────────
window.EJS_pathtodata    = './data/';
window.EJS_startOnLoaded = true;
window.EJS_color         = '#0088ff';
window.EJS_backgroundColor = '#000010';
window.EJS_adUrl         = '';
window.EJS_Buttons = {
  playPause:false, restart:true, mute:true,
  settings:true, fullscreen:false,
  saveState:true, loadState:true,
  gamepad:false, cheat:false
};

// ── Sélection de jeu ─────────────────────────────────────────────
const menu    = document.getElementById('menu');
const app     = document.getElementById('app');
const titleBar = document.getElementById('game-title-bar');

let emuLoaded = false;

document.querySelectorAll('.game-card').forEach(card => {
  card.addEventListener('click', () => launchGame(
    card.dataset.rom,
    card.dataset.title
  ));
  card.addEventListener('touchend', e => {
    e.preventDefault();
    launchGame(card.dataset.rom, card.dataset.title);
  }, { passive:false });
});

function launchGame(romUrl, title) {
  // Config EmulatorJS pour ce jeu
  window.EJS_core    = 'smsplus';
  window.EJS_gameUrl = romUrl;
  window.EJS_player  = '#game';

  titleBar.textContent = title;

  // Transition menu → jeu
  menu.style.transition = 'opacity .4s';
  menu.style.opacity = '0';
  setTimeout(() => {
    menu.style.display = 'none';
    app.classList.add('visible');

    if (!emuLoaded) {
      emuLoaded = true;
      const s = document.createElement('script');
      s.src = './data/loader.js';
      document.body.appendChild(s);
    } else {
      if (window.EJS_emulator) {
        window.EJS_emulator.changeGame(romUrl).catch(()=>{});
      }
    }

    // Tap-to-start : cliquer sur le canvas EmulatorJS au premier tap
    setupGameTap();
  }, 400);
}

// ── Tap-to-start ─────────────────────────────────────────────────
function setupGameTap() {
  const tap = document.getElementById('game-tap');
  tap.classList.remove('hidden');

  function doTap(e) {
    e.preventDefault();
    tap.classList.add('hidden');
    // Cliquer sur le canvas EmulatorJS pour débloquer l'audio + démarrer
    const canvas = document.querySelector('#game canvas');
    if (canvas) {
      canvas.dispatchEvent(new MouseEvent('click', { bubbles: true }));
      canvas.dispatchEvent(new MouseEvent('mousedown', { bubbles: true }));
      canvas.dispatchEvent(new MouseEvent('mouseup', { bubbles: true }));
    }
    // Fallback : si le canvas n'est pas encore là, réessayer
    if (!canvas) {
      setTimeout(() => {
        const c = document.querySelector('#game canvas');
        if (c) { c.click(); }
      }, 800);
    }
  }

  tap.addEventListener('click', doTap);
  tap.addEventListener('touchend', doTap, { passive: false });
}

// ── Bouton retour ────────────────────────────────────────────────
document.getElementById('back-btn').addEventListener('click', () => {
  app.classList.remove('visible');
  menu.style.display = '';
  menu.style.opacity = '0';
  setTimeout(() => { menu.style.transition='opacity .3s'; menu.style.opacity='1'; }, 10);
});

// ── FAUSSE MANETTE GAMEPAD (seule méthode qui marche avec RetroArch WASM) ──
// RetroArch lit navigator.getGamepads() dans sa boucle principale.
// On injecte un gamepad virtuel standard que EmulatorJS reconnaît.
//
// Mapping Standard Gamepad → RetroArch/SMS:
//  button[0]  = A  → Saut / Action 1
//  button[1]  = B  → Action 2
//  button[9]  = Start
//  button[8]  = Select
//  button[12] = D-pad Haut
//  button[13] = D-pad Bas
//  button[14] = D-pad Gauche
//  button[15] = D-pad Droite

const PAD = {
  id: 'Virtual Gamepad (STANDARD GAMEPAD MAPPING) 0',
  index: 0,
  connected: true,
  timestamp: performance.now(),
  mapping: 'standard',
  axes: [0, 0, 0, 0],
  buttons: Array.from({length:17}, ()=>({ pressed:false, touched:false, value:0 }))
};

// Intercepter navigator.getGamepads pour retourner notre faux gamepad
const _orig = navigator.getGamepads.bind(navigator);
navigator.getGamepads = function() {
  const real = _orig();
  return [PAD, real[1]??null, real[2]??null, real[3]??null];
};

// Annoncer la connexion du gamepad dès que l'émulateur est prêt
function connectPad() {
  PAD.timestamp = performance.now();
  try { window.dispatchEvent(new GamepadEvent('gamepadconnected', { gamepad: PAD })); } catch(e){}
}
// Le connecter immédiatement et aussi quand EJS est prêt
connectPad();
window.addEventListener('EJS_ready', () => { setTimeout(connectPad, 500); });

function padBtn(i, on) {
  PAD.buttons[i] = { pressed:on, touched:on, value: on?1:0 };
  PAD.timestamp  = performance.now();
}
function tapBtn(i, ms=120) {
  padBtn(i, true);
  setTimeout(()=>padBtn(i, false), ms);
}

// Boutons → actions gamepad
const btnMap = {
  'btn-left':  { down:()=>padBtn(14,true),   up:()=>padBtn(14,false) },
  'btn-right': { down:()=>padBtn(15,true),   up:()=>padBtn(15,false) },
  'btn-jump':  { down:()=>padBtn(0,true),    up:()=>padBtn(0,false)  },
  'btn-start': { down:()=>tapBtn(9,150),     up:()=>{}               },
};

const touchOwner = new Map();

function getBtnFromTarget(el) {
  while (el && el !== document.body) {
    if (el.id && btnMap[el.id]) return el.id;
    el = el.parentElement;
  }
  return null;
}
function btnDown(id){ document.getElementById(id)?.classList.add('pressed'); btnMap[id]?.down(); }
function btnUp(id){   document.getElementById(id)?.classList.remove('pressed'); btnMap[id]?.up(); }

const ctrl = document.getElementById('ctrl');
ctrl.addEventListener('touchstart', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const b = getBtnFromTarget(t.target);
    if(b){ touchOwner.set(t.identifier,b); btnDown(b); }
  }
},{passive:false});
ctrl.addEventListener('touchend', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const b = touchOwner.get(t.identifier);
    if(b){ btnUp(b); touchOwner.delete(t.identifier); }
  }
},{passive:false});
ctrl.addEventListener('touchcancel', e=>{
  for(const t of e.changedTouches){
    const b = touchOwner.get(t.identifier);
    if(b){ btnUp(b); touchOwner.delete(t.identifier); }
  }
},{passive:false});

// ── Plein écran ──────────────────────────────────────────────────
document.getElementById('fs-btn').addEventListener('click', ()=>{
  const el = document.documentElement;
  if(!document.fullscreenElement) el.requestFullscreen?.() || el.webkitRequestFullscreen?.();
  else document.exitFullscreen?.() || document.webkitExitFullscreen?.();
});
</script>
</body>
</html>
