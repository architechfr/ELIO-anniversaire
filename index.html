<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000010">
  <title>Élio dans Sonic 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000010;
      font-family: sans-serif;
      touch-action: none;
    }

    /* ────────────────────────────
       SPLASH SCREEN
    ──────────────────────────── */
    #splash {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      background: #000010;
      overflow: hidden;
    }

    #splash-bg {
      position: absolute; inset: 0;
      background-image: url('poster.jpg');
      background-size: cover;
      background-position: center top;
      filter: brightness(0.85);
    }

    /* Fallback gradient si pas d'image */
    #splash-bg::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(0,100,255,0.5) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 30%, rgba(200,0,50,0.4) 0%, transparent 60%),
        linear-gradient(180deg, #000820 0%, #000010 100%);
    }

    #splash-bg::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(to bottom, transparent, #000010);
    }

    .splash-content {
      position: relative; z-index: 2;
      text-align: center;
      padding-bottom: max(40px, env(safe-area-inset-bottom, 40px));
      width: 100%;
    }

    .splash-title {
      font-size: clamp(48px, 18vw, 80px);
      font-weight: 900;
      font-style: italic;
      letter-spacing: 4px;
      color: #fff;
      text-shadow:
        0 0 20px #0060ff,
        0 0 40px #0040cc,
        3px 3px 0 #00008b,
        -1px -1px 0 #0080ff;
      line-height: 1;
    }

    .splash-dans {
      font-size: clamp(14px, 5vw, 22px);
      font-weight: 700;
      letter-spacing: 8px;
      color: #aac8ff;
      text-shadow: 0 0 10px #4488ff;
      margin-bottom: 4px;
    }

    .splash-sonic {
      font-size: clamp(32px, 12vw, 56px);
      font-weight: 900;
      font-style: italic;
      letter-spacing: 3px;
      color: #0af;
      text-shadow:
        0 0 15px #00aaff,
        0 0 40px #0055ff,
        3px 3px 0 #003399;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .splash-sonic .num2 {
      color: #FFD700;
      text-shadow: 0 0 15px #ffd700, 0 0 30px #ff8800, 2px 2px 0 #8b6000;
    }

    .splash-sub {
      font-size: clamp(9px, 3vw, 14px);
      letter-spacing: 5px;
      color: #88aacc;
      margin-top: 4px;
      text-transform: uppercase;
    }

    .tap-to-play {
      margin-top: 28px;
      font-size: clamp(11px, 3.5vw, 16px);
      font-weight: 700;
      letter-spacing: 3px;
      color: #fff;
      text-transform: uppercase;
      animation: blink 1.4s ease-in-out infinite;
      text-shadow: 0 0 15px #00aaff;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* Lightning effect */
    .lightning {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(135deg, transparent 40%, rgba(0,120,255,0.05) 50%, transparent 60%);
      animation: lightning 3s ease-in-out infinite;
    }
    @keyframes lightning {
      0%, 90%, 100% { opacity: 0; }
      92%, 94% { opacity: 1; }
    }

    /* ────────────────────────────
       GAME LAYOUT
    ──────────────────────────── */
    #app {
      display: none;
      flex-direction: column;
      width: 100%; height: 100%;
      background: #000;
    }

    #app.visible { display: flex; }

    /* Petite barre titre */
    #topbar {
      position: relative;
      background: linear-gradient(90deg, #000820, #001040, #000820);
      border-bottom: 2px solid rgba(0,150,255,0.3);
      padding: 6px 16px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }

    #topbar .game-title {
      font-size: 11px; font-weight: 900; font-style: italic;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #0af, #FFD700);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    #topbar .player-name {
      font-size: 10px; font-weight: 700;
      color: #FFD700;
      text-shadow: 0 0 8px #ffd700;
      letter-spacing: 1px;
    }

    /* Zone émulateur */
    #emu-wrapper {
      flex: 1;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      background: #000;
    }

    #game {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ────────────────────────────
       MANETTE TACTILE
    ──────────────────────────── */
    #ctrl {
      position: absolute; inset: 0; z-index: 20;
      pointer-events: none;
    }

    /* ── D-PAD gauche ── */
    #dpad {
      position: absolute;
      bottom: max(18px, env(safe-area-inset-bottom, 18px));
      left: 16px;
      display: flex; gap: 8px;
      pointer-events: none;
    }

    .dpad-btn {
      width: 72px; height: 72px;
      border-radius: 16px;
      background: rgba(0, 120, 255, 0.18);
      border: 2px solid rgba(0, 180, 255, 0.45);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      color: rgba(255,255,255,0.55);
      pointer-events: all;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.08s, transform 0.08s, border-color 0.08s;
      touch-action: none;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .dpad-btn.pressed {
      background: rgba(0, 160, 255, 0.55);
      border-color: rgba(0, 220, 255, 0.9);
      color: #fff;
      transform: scale(0.92);
      box-shadow: 0 0 20px rgba(0,180,255,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    /* ── Boutons action droite ── */
    #action-btns {
      position: absolute;
      bottom: max(18px, env(safe-area-inset-bottom, 18px));
      right: 16px;
      display: flex; flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      pointer-events: none;
    }

    #btn-start {
      width: 56px; height: 32px;
      border-radius: 16px;
      background: rgba(255, 200, 0, 0.15);
      border: 2px solid rgba(255, 215, 0, 0.45);
      color: rgba(255, 215, 0, 0.7);
      font-size: 9px; font-weight: 900;
      letter-spacing: 1px; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center;
      pointer-events: all;
      user-select: none; -webkit-user-select: none;
      touch-action: none; cursor: pointer;
      transition: background 0.08s, transform 0.08s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    #btn-start.pressed {
      background: rgba(255, 215, 0, 0.45);
      border-color: #FFD700;
      color: #fff;
      transform: scale(0.92);
      box-shadow: 0 0 16px rgba(255,215,0,0.5);
    }

    #btn-jump {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(0, 200, 80, 0.18);
      border: 3px solid rgba(0, 230, 100, 0.5);
      color: rgba(255,255,255,0.7);
      font-size: 32px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: all;
      user-select: none; -webkit-user-select: none;
      touch-action: none; cursor: pointer;
      transition: background 0.08s, transform 0.08s, border-color 0.08s;
      box-shadow: 0 2px 16px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    #btn-jump.pressed {
      background: rgba(0, 230, 100, 0.55);
      border-color: rgba(0, 255, 120, 0.9);
      color: #fff;
      transform: scale(0.9);
      box-shadow: 0 0 24px rgba(0,230,100,0.6);
    }

    /* Bouton plein écran */
    #fs-btn {
      position: absolute; top: 8px; right: 12px; z-index: 50;
      width: 32px; height: 32px;
      background: rgba(0,80,200,0.4);
      border: 1px solid rgba(0,150,255,0.5);
      border-radius: 6px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      pointer-events: all;
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════
     SPLASH SCREEN
══════════════════════════════════ -->
<div id="splash">
  <div id="splash-bg"></div>
  <div class="lightning"></div>

  <div class="splash-content">
    <div class="splash-dans">ÉLIO DANS</div>
    <div class="splash-title">SONIC</div>
    <div class="splash-sonic">THE HEDGEHOG <span class="num2">2</span></div>
    <div class="splash-sub">Game Gear • 1992</div>
    <div class="tap-to-play">▶ &nbsp; APPUIE POUR JOUER &nbsp; ◀</div>
  </div>
</div>

<!-- ══════════════════════════════════
     APP
══════════════════════════════════ -->
<div id="app">

  <div id="topbar">
    <span class="game-title">SONIC 2</span>
    <span class="player-name">⭐ ÉLIO</span>
  </div>

  <div id="emu-wrapper">

    <!-- Émulateur -->
    <div id="game"></div>

    <!-- Manette tactile -->
    <div id="ctrl">
      <!-- D-pad gauche -->
      <div id="dpad">
        <div class="dpad-btn" id="btn-left">◀</div>
        <div class="dpad-btn" id="btn-right">▶</div>
      </div>
      <!-- Boutons action droite -->
      <div id="action-btns">
        <div id="btn-start">START</div>
        <div id="btn-jump">🔵</div>
      </div>
    </div>

    <!-- Bouton plein écran -->
    <div id="fs-btn" title="Plein écran">⛶</div>

  </div>
</div>

<!-- ══════════════════════════════════
     SCRIPTS
══════════════════════════════════ -->
<script>
// ── EmulatorJS config (défini AVANT le loader) ──────────────────────
window.EJS_player        = '#game';
window.EJS_core          = 'smsplus';
window.EJS_gameUrl       = 'rom/Sonic the Hedgehog 2.gg';
window.EJS_pathtodata    = './data/';
window.EJS_startOnLoaded = true;
window.EJS_color         = '#0088ff';
window.EJS_backgroundColor = '#000010';
window.EJS_adUrl         = '';
window.EJS_Buttons = {
  playPause: false, restart: true, mute: true,
  settings: true, fullscreen: false,
  saveState: true, loadState: true,
  gamepad: false, cheat: false
};

// ── Splash → lancer le jeu ──────────────────────────────────────────
const splash   = document.getElementById('splash');
const app      = document.getElementById('app');
let   gameStarted = false;

function startGame() {
  if (gameStarted) return;
  gameStarted = true;

  // Transition
  splash.style.transition = 'opacity 0.6s';
  splash.style.opacity = '0';
  setTimeout(() => {
    splash.style.display = 'none';
    app.classList.add('visible');

    // Charge EmulatorJS maintenant
    const s = document.createElement('script');
    s.src = './data/loader.js';
    document.body.appendChild(s);
  }, 600);
}

splash.addEventListener('click',     startGame);
splash.addEventListener('touchstart', startGame, { passive: true });

// ── Contrôles tactiles ────────────────────────────────────────────
function pressKey(key)  { document.dispatchEvent(new KeyboardEvent('keydown', { key, code: key, keyCode: keyCode(key), bubbles: true, cancelable: true })); }
function releaseKey(key){ document.dispatchEvent(new KeyboardEvent('keyup',   { key, code: key, keyCode: keyCode(key), bubbles: true, cancelable: true })); }
function keyCode(key) {
  return { ArrowLeft:37, ArrowRight:39, ArrowUp:38, ArrowDown:40, z:90, Enter:13 }[key] ?? 0;
}
function tapKey(key, ms = 100) { pressKey(key); setTimeout(() => releaseKey(key), ms); }

// Binding bouton → touche
const btnMap = {
  'btn-left':  { down: () => pressKey('ArrowLeft'),  up: () => releaseKey('ArrowLeft')  },
  'btn-right': { down: () => pressKey('ArrowRight'), up: () => releaseKey('ArrowRight') },
  'btn-jump':  { down: () => tapKey('z', 120),       up: () => {}                       },
  'btn-start': { down: () => tapKey('Enter', 80),    up: () => {}                       },
};

// Suivi multi-touch : quel bouton possède quel touch
const touchOwner = new Map(); // touchId → btnId

function btnDown(btnId) {
  const el = document.getElementById(btnId);
  if (el) el.classList.add('pressed');
  btnMap[btnId]?.down();
}
function btnUp(btnId) {
  const el = document.getElementById(btnId);
  if (el) el.classList.remove('pressed');
  btnMap[btnId]?.up();
}

function getBtnFromTarget(el) {
  while (el && el !== document.body) {
    if (el.id && btnMap[el.id]) return el.id;
    el = el.parentElement;
  }
  return null;
}

document.getElementById('ctrl').addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const btn = getBtnFromTarget(t.target);
    if (btn) { touchOwner.set(t.identifier, btn); btnDown(btn); }
  }
}, { passive: false });

document.getElementById('ctrl').addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const btn = touchOwner.get(t.identifier);
    if (btn) { btnUp(btn); touchOwner.delete(t.identifier); }
  }
}, { passive: false });

document.getElementById('ctrl').addEventListener('touchcancel', e => {
  for (const t of e.changedTouches) {
    const btn = touchOwner.get(t.identifier);
    if (btn) { btnUp(btn); touchOwner.delete(t.identifier); }
  }
}, { passive: false });

// ── Plein écran ──────────────────────────────────────────────────
document.getElementById('fs-btn').addEventListener('click', () => {
  const el = document.documentElement;
  if (!document.fullscreenElement) {
    el.requestFullscreen?.() || el.webkitRequestFullscreen?.();
  } else {
    document.exitFullscreen?.() || document.webkitExitFullscreen?.();
  }
});

// Aller en plein écran au lancement sur mobile
window.addEventListener('EJS_ready', () => {
  if (window.innerWidth < 768) {
    document.documentElement.requestFullscreen?.().catch(() => {});
  }
});
</script>

</body>
</html>
